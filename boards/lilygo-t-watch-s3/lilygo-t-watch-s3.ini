; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:lilygo-t-watch-s3]
board = lilygo-t-watch-s3
board_build.partitions = support_files/custom_16Mb_ultra.csv
build_src_filter =${env.build_src_filter} +<../boards/lilygo-t-watch-s3>
build_flags =
	${env.build_flags}
	-Iboards/lilygo-t-watch-s3
	-mfix-esp32-psram-cache-issue
	-mfix-esp32-psram-cache-strategy=memw
	-DOTA_TAG='"t-watch-s3"'

	;-DPART_04MB =0
	;-DPART_08MB=0
	-DPART_16MB=1

	;Font sizes, depending on device
	-DFP=1
	-DFM=2
	-DFG=3

	;Screen Setup
	-DHAS_SCREEN=1
	-DROTATION=2

	;tft Brighness Control
	-DTFT_BRIGHT_CHANNEL=3
	-DTFT_BRIGHT_Bits=8
	-DTFT_BRIGHT_FREQ=1000

	;TFT_eSPI display
	-DUSE_TFT_ESPI
	-DUSER_SETUP_LOADED=1
	-DUSE_HSPI_PORT=1
	;-DUSER_SETUP_ID=214
	-DST7789_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=240
	-DTFT_INVERSION_ON
	-DTFT_BL=45
	-DTFT_MISO=-1
	-DTFT_MOSI=13
	-DTFT_SCLK=18
	-DTFT_CS=12
	-DTFT_DC=38
	-DTFT_RST=-1
	-DTOUCH_CS=-1

	;TouchScreen Controller
	-DHAS_TOUCH=1

	-DSMOOTH_FONT=1

	;SD Card Setup pins
	-DSDCARD_CS=-1
	-DSDCARD_SCK=-1
	-DSDCARD_MISO=-1
	-DSDCARD_MOSI=-1

lib_deps =
	${env.lib_deps}
	lewisxhe/XPowersLib @0.2.7
	lewisxhe/SensorLib@0.3.4
	Bodmer/TFT_eSPI @ 2.5.43

lib_ignore =
	GFX Library for Arduino
